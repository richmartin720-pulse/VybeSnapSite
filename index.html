<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VybeSnap – Daily Vybes with Friends</title>

  <!-- FAVICON -->
  <link rel="icon" href="favicon-32.png">
  <link rel="apple-touch-icon" href="apple-touch.png">
  <meta name="theme-color" content="#0a0a0f">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: radial-gradient(circle at top, #211333 0%, #070711 45%, #020208 100%);
      color: #fff;
      min-height: 100vh;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 80px;
    }

    .brand {
      font-size: 24px;
      font-weight: 800;
    }

    .brand span {
      background: linear-gradient(90deg, #fff, #d946ef, #22d3ee, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    nav a {
      color: #aaa;
      text-decoration: none;
      margin-left: 20px;
    }

    nav a:hover { color: #fff; }

    .hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }

    h1 {
      font-size: clamp(44px, 7vw, 70px);
      line-height: 1;
      margin-bottom: 20px;
    }

    h1 span {
      background: linear-gradient(90deg, #fff, #d946ef, #22d3ee, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 18px;
      color: #c8c8d2;
      margin-bottom: 30px;
    }

    .cta {
      display: inline-block;
      padding: 14px 22px;
      border-radius: 999px;
      background: linear-gradient(90deg, #a855f7, #ec4899, #22d3ee);
      color: white;
      text-decoration: none;
      font-weight: 700;
    }

    /* ICON */
    .icon-card {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .icon-card img {
      width: 260px;
      height: auto;
      border-radius: 28px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    }

    footer {
      margin-top: 80px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.08);
      color: #888;
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    footer a {
      color: #aaa;
      text-decoration: none;
    }

    @media (max-width: 800px) {
      .hero {
        grid-template-columns: 1fr;
        text-align: center;
      }
    }
  </style>
</head>

<body>

  <main class="page">

    <!-- NAV -->
    <nav>
      <div class="brand">Vybe<span>Snap</span></div>
      <div>
        <a href="privacy.html">Privacy</a>
        <a href="terms.html">Terms</a>
        <a href="support.html">Support</a>
      </div>
    </nav>

    <!-- HERO -->
    <section class="hero">
      <div>
        <h1>Snap your mood.<br><span>See your friends.</span></h1>

        <p class="subtitle">
          Daily photo + emoji check-ins.  
          Keep it real. See your friends’ vybes instantly.
        </p>

        <a class="cta" href="#">Coming soon to the App Store</a>
      </div>

      <!-- THIS IS THE ICON -->
      <div class="icon-card">
        <img src="icon.png" alt="VybeSnap Icon">
      </div>
    </section>

    <!-- FOOTER -->
    <footer>
      <span>© 2026 VybeSnap</span>
      <a href="privacy.html">Privacy</a>
      <a href="terms.html">Terms</a>
      <a href="support.html">Support</a>
      <a href="delete-account.html">Delete Account</a>
    </footer>

  </main>

</body>
</html>
